<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VNotes</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, "Noto Sans SC", "Microsoft YaHei", sans-serif;
      background: #f6f8f5;
      color: #173b2f;
    }

    .card {
      width: min(720px, 90%);
      padding: 48px;
      border-radius: 24px;
      background: #ffffffcc;
      border: 1px solid rgba(23, 59, 47, 0.12);
      box-shadow: 0 20px 60px rgba(23, 59, 47, 0.08);
    }

    .tag {
      display: inline-block;
      margin-bottom: 18px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #e8ddaa;
      font-size: 14px;
      font-weight: 600;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 42px;
      line-height: 1.15;
    }

    p {
      margin: 0 0 28px;
      max-width: 560px;
      line-height: 1.8;
      color: #4f655c;
    }

    a {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 999px;
      background: #173b2f;
      color: white;
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="tag">Engineering Notes</span>
    <h1>VNotes</h1>
    <p>
      一个用于整理 C++、Linux、数据库与 WebServer 项目记录的个人技术笔记站。
    </p>
    <a href="https://github.com/kangbaoH">View GitHub</a>
  </main>
</body>
</html>
